<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RapiPedidos - Historial de Clientes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="historial.css">
<link rel="stylesheet" href="../../app.css">
</head>
<body>

<nav class="navbar">
  <h1>RapiPedidos</h1>
  <button class="nav-btn btn-exit">Cerrar Sesión</button>
</nav>

<div class="main">
  <a href="../dashboard/dash.html" class="back-link"><i class="ti ti-arrow-left"></i> Volver al Panel de Control</a>
  <div class="page-title">Historial de clientes</div>

  <div class="filters">
    <div class="fgroup">
      <label>Buscador por Nombre o Correo</label>
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input type="text" id="searchInput" placeholder="Ej. Juan Pérez..." oninput="render()">
      </div>
    </div>
    <div class="fgroup">
      <label>Filtrar por Fecha</label>
      <input type="date" class="date-input" id="fechaFiltro" onchange="render()">
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Cliente / Contacto</th>
          <th>Productos &amp; Cantidad</th>
          <th>Dirección de Entrega</th>
          <th>Fecha / Hora</th>
          <th>Total</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="pagination">
      <span class="pag-info" id="pagInfo"></span>
      <div class="pages" id="pagBtns"></div>
    </div>
  </div>
</div>

<footer>
  <span class="footer-copy">© 2024 RapiPedidos System. Todos los derechos reservados.</span>
  <div class="footer-links">
    <a href="#">Privacidad</a><a href="#">Términos</a><a href="#">Soporte</a><a href="#">Contacto</a>
  </div>
</footer>

<script src="historial.js"></script>
</body>
</html>
